<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse Books — bookVault</title>
  <meta name="description" content="Browse our curated library of premium e-books. Buy or rent with transparent pricing." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
</head>
<body class="browse-page">

  <!-- Navigation -->
  <nav class="site-nav scrolled" aria-label="Main navigation">
    <div class="site-nav__inner">
      <a href="index.html" class="site-nav__logo">book<span>Vault</span></a>
      <ul class="site-nav__links" role="list">
        <li><a href="index.html">Home</a></li>
        <li><a href="browse.html" class="active">Browse</a></li>
        <li><a href="index.html#pricing">Pricing</a></li>
        <li><a href="index.html#about">About</a></li>
      </ul>
      <div class="site-nav__cta">
        <a href="#" class="btn btn--ghost">Sign In</a>
        <a href="browse.html" class="btn btn--primary">Browse the Vault</a>
      </div>
    </div>
  </nav>

  <!-- Browse hero -->
  <header class="browse-hero">
    <div class="container browse-hero__inner">
      <div>
        <p class="section-label">The Vault</p>
        <h1 class="browse-hero__title">Browse Books</h1>
        <p class="browse-hero__sub">Buy to own or rent for 7–30 days. Honest prices, no subscriptions.</p>
      </div>
      <div style="text-align:right;">
        <div class="browse-hero__count" id="result-count">30</div>
        <p class="browse-hero__count-label">books available</p>
      </div>
    </div>
  </header>

  <!-- Filter bar -->
  <div class="filter-bar" role="navigation" aria-label="Genre filter">
    <div class="container filter-bar__inner">
      <!-- chips injected by browse.ts -->
      <div id="genre-chips" style="display:contents;"></div>

      <div class="search-wrapper">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input
          type="search"
          id="search-input"
          class="search-input"
          placeholder="Search title, author…"
          aria-label="Search books"
        />
      </div>
    </div>
  </div>

  <!-- Books grid -->
  <main class="browse-main">
    <div class="container">
      <div class="books-grid" id="books-grid">
        <!-- populated by browse.ts -->
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer style="
    border-top: 1px solid var(--color-border);
    padding: 2rem 0;
    background: var(--color-bg-deep);
  ">
    <div class="container" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem;">
      <a href="index.html" style="font-family:var(--font-display); font-size:1.25rem; font-weight:700; color:var(--color-accent);">
        book<span style="color:var(--color-text-primary);">Vault</span>
      </a>
      <p style="font-size:0.75rem; color:var(--color-text-dim);">
        7-day refund, no questions asked · Cancel anytime in ≤3 taps
      </p>
    </div>
  </footer>

  <script type="module" src="/src/browse.ts"></script>
</body>
</html>
